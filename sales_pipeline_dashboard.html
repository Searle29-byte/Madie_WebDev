
<h2 class="sr-only">Sales pipeline dashboard showing revenue, conversion rates, and deal stages for a business development team</h2>

<style>
  .dash { padding: 1rem 0; font-family: var(--font-sans); }
  .metric-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
  .metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .metric-delta { font-size: 12px; margin-top: 4px; }
  .up { color: #3B6D11; }
  .down { color: #A32D2D; }
  .section-label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; text-transform: none; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 1.5rem; }
  .chart-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 12px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary); }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-swatch { width: 10px; height: 10px; border-radius: 2px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
  .filter-row label { font-size: 13px; color: var(--color-text-secondary); }
  select { font-size: 13px; }
  .funnel-wrap { display: flex; flex-direction: column; gap: 8px; }
  .funnel-bar-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .funnel-bar-label { width: 90px; text-align: right; color: var(--color-text-secondary); flex-shrink: 0; }
  .funnel-track { flex: 1; background: var(--color-background-secondary); border-radius: 4px; height: 28px; overflow: hidden; }
  .funnel-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 10px; font-size: 12px; font-weight: 500; transition: width 0.6s ease; }
  .funnel-count { width: 40px; text-align: right; color: var(--color-text-secondary); font-size: 12px; flex-shrink: 0; }
  .table-wrap { overflow-x: auto; }
  .rep-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rep-table th { text-align: left; padding: 8px 10px; color: var(--color-text-secondary); font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .rep-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: var(--border-radius-md); font-size: 11px; font-weight: 500; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .sparkbar { display: flex; gap: 2px; align-items: flex-end; height: 24px; }
  .spark { width: 6px; border-radius: 2px; background: #B5712a; }
</style>

<div class="dash">

  <div class="filter-row">
    <label>Period:</label>
    <select id="period-sel" onchange="updateDash()">
      <option value="q1">Q1 2026</option>
      <option value="q2" selected>Q2 2026</option>
      <option value="q3">Q3 2026</option>
    </select>
    <label style="margin-left: 12px;">Team:</label>
    <select id="team-sel" onchange="updateDash()">
      <option value="all">All reps</option>
      <option value="outbound">Outbound</option>
      <option value="inbound">Inbound</option>
    </select>
  </div>

  <div class="metric-row" id="metrics"></div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Revenue by month</div>
      <div class="legend">
        <span class="leg-item"><span class="leg-swatch" style="background:#b5712a"></span>Closed won</span>
        <span class="leg-item"><span class="leg-swatch" style="background:#e0c9a8"></span>Pipeline</span>
      </div>
      <div style="position: relative; height: 180px;">
        <canvas id="revChart" role="img" aria-label="Grouped bar chart showing closed won revenue vs pipeline value per month">Monthly closed won and pipeline revenue.</canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Deal stage mix</div>
      <div class="legend" id="stage-legend"></div>
      <div style="position: relative; height: 180px;">
        <canvas id="stageChart" role="img" aria-label="Doughnut chart of deal stage distribution">Deal stage breakdown.</canvas>
      </div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Pipeline funnel</div>
      <div class="funnel-wrap" id="funnel"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Rep performance</div>
      <div class="table-wrap">
        <table class="rep-table" id="rep-table">
          <thead><tr><th>Rep</th><th>Calls</th><th>Demos</th><th>Closed</th><th>Quota</th><th>Trend</th></tr></thead>
          <tbody id="rep-body"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DATA = {
  q1: {
    metrics: [
      { label: 'Total pipeline', value: '$284K', delta: '+12%', up: true },
      { label: 'Closed won', value: '$97K', delta: '+8%', up: true },
      { label: 'Win rate', value: '24%', delta: '-2%', up: false },
      { label: 'Avg deal size', value: '$6,200', delta: '+5%', up: true }
    ],
    months: ['Jan','Feb','Mar'],
    closed: [28, 35, 34],
    pipeline: [80, 95, 109],
    stages: [42, 28, 18, 9, 3],
    funnel: [
      { label: 'Prospected', count: 420, pct: 100, color: '#4a3520' },
      { label: 'Contacted', count: 210, pct: 50, color: '#b5712a' },
      { label: 'Qualified', count: 98, pct: 23, color: '#c9952a' },
      { label: 'Demo done', count: 54, pct: 13, color: '#5a7a3a' },
      { label: 'Closed won', count: 24, pct: 6, color: '#3b6d11' },
    ],
    reps: [
      { name: 'Madie S.', calls: 148, demos: 22, closed: 8, quota: 92, sparks: [3,5,4,6,5,7,8] },
      { name: 'Kamren B.', calls: 132, demos: 19, closed: 7, quota: 84, sparks: [4,4,6,5,7,5,7] },
      { name: 'Ashton L.', calls: 116, demos: 15, closed: 5, quota: 71, sparks: [3,3,4,5,4,5,5] },
      { name: 'Ben M.', calls: 104, demos: 12, closed: 4, quota: 58, sparks: [2,3,3,4,3,4,4] },
    ]
  },
  q2: {
    metrics: [
      { label: 'Total pipeline', value: '$341K', delta: '+20%', up: true },
      { label: 'Closed won', value: '$118K', delta: '+22%', up: true },
      { label: 'Win rate', value: '27%', delta: '+3%', up: true },
      { label: 'Avg deal size', value: '$7,100', delta: '+15%', up: true }
    ],
    months: ['Apr','May','Jun'],
    closed: [36, 42, 40],
    pipeline: [102, 118, 121],
    stages: [38, 25, 20, 12, 5],
    funnel: [
      { label: 'Prospected', count: 510, pct: 100, color: '#4a3520' },
      { label: 'Contacted', count: 270, pct: 53, color: '#b5712a' },
      { label: 'Qualified', count: 130, pct: 25, color: '#c9952a' },
      { label: 'Demo done', count: 72, pct: 14, color: '#5a7a3a' },
      { label: 'Closed won', count: 35, pct: 7, color: '#3b6d11' },
    ],
    reps: [
      { name: 'Madie S.', calls: 162, demos: 28, closed: 11, quota: 110, sparks: [5,6,7,8,9,9,11] },
      { name: 'Kamren B.', calls: 145, demos: 24, closed: 9, quota: 98, sparks: [5,6,7,7,8,8,9] },
      { name: 'Ashton L.', calls: 128, demos: 18, closed: 7, quota: 82, sparks: [4,5,5,6,6,7,7] },
      { name: 'Ben M.', calls: 110, demos: 14, closed: 5, quota: 64, sparks: [3,4,4,5,5,5,5] },
    ]
  },
  q3: {
    metrics: [
      { label: 'Total pipeline', value: '$398K', delta: '+17%', up: true },
      { label: 'Closed won', value: '$89K', delta: '-25%', up: false },
      { label: 'Win rate', value: '21%', delta: '-6%', up: false },
      { label: 'Avg deal size', value: '$6,800', delta: '-4%', up: false }
    ],
    months: ['Jul','Aug','Sep'],
    closed: [32, 29, 28],
    pipeline: [128, 135, 135],
    stages: [45, 30, 14, 8, 3],
    funnel: [
      { label: 'Prospected', count: 480, pct: 100, color: '#4a3520' },
      { label: 'Contacted', count: 240, pct: 50, color: '#b5712a' },
      { label: 'Qualified', count: 108, pct: 23, color: '#c9952a' },
      { label: 'Demo done', count: 55, pct: 11, color: '#5a7a3a' },
      { label: 'Closed won', count: 21, pct: 4, color: '#3b6d11' },
    ],
    reps: [
      { name: 'Madie S.', calls: 144, demos: 21, closed: 7, quota: 82, sparks: [8,7,6,5,5,6,7] },
      { name: 'Kamren B.', calls: 130, demos: 18, closed: 6, quota: 76, sparks: [7,6,6,5,4,5,6] },
      { name: 'Ashton L.', calls: 112, demos: 14, closed: 5, quota: 68, sparks: [5,5,4,4,4,5,5] },
      { name: 'Ben M.', calls: 98, demos: 10, closed: 3, quota: 47, sparks: [3,3,3,2,3,3,3] },
    ]
  }
};

const STAGE_LABELS = ['Prospecting','Discovery','Proposal','Negotiation','Closed won'];
const STAGE_COLORS = ['#4a3520','#b5712a','#c9952a','#5a7a3a','#3b6d11'];

let revChart, stageChart;

function quotaBadge(pct) {
  if (pct >= 100) return `<span class="badge badge-green">${pct}%</span>`;
  if (pct >= 75) return `<span class="badge badge-amber">${pct}%</span>`;
  return `<span class="badge badge-red">${pct}%</span>`;
}

function sparkHTML(sparks) {
  const max = Math.max(...sparks);
  return `<div class="sparkbar">${sparks.map(v => `<div class="spark" style="height:${Math.round(v/max*22)+2}px"></div>`).join('')}</div>`;
}

function updateDash() {
  const period = document.getElementById('period-sel').value;
  const d = DATA[period];

  // Metrics
  document.getElementById('metrics').innerHTML = d.metrics.map(m => `
    <div class="metric">
      <div class="metric-label">${m.label}</div>
      <div class="metric-value">${m.value}</div>
      <div class="metric-delta ${m.up ? 'up' : 'down'}">${m.up ? '▲' : '▼'} ${m.delta} vs prior period</div>
    </div>`).join('');

  // Revenue chart
  if (revChart) revChart.destroy();
  revChart = new Chart(document.getElementById('revChart'), {
    type: 'bar',
    data: {
      labels: d.months,
      datasets: [
        { label: 'Closed won ($K)', data: d.closed, backgroundColor: '#b5712a', borderRadius: 3 },
        { label: 'Pipeline ($K)', data: d.pipeline, backgroundColor: '#e0c9a8', borderRadius: 3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 11 }, autoSkip: false }, grid: { display: false } },
        y: { ticks: { font: { size: 11 }, callback: v => '$'+v+'K' }, grid: { color: 'rgba(0,0,0,0.06)' } }
      }
    }
  });

  // Stage donut
  document.getElementById('stage-legend').innerHTML = STAGE_LABELS.map((l,i) =>
    `<span class="leg-item"><span class="leg-swatch" style="background:${STAGE_COLORS[i]}"></span>${l} ${d.stages[i]}%</span>`
  ).join('');

  if (stageChart) stageChart.destroy();
  stageChart = new Chart(document.getElementById('stageChart'), {
    type: 'doughnut',
    data: {
      labels: STAGE_LABELS,
      datasets: [{ data: d.stages, backgroundColor: STAGE_COLORS, borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: { legend: { display: false } }
    }
  });

  // Funnel
  document.getElementById('funnel').innerHTML = d.funnel.map(f => `
    <div class="funnel-bar-row">
      <span class="funnel-bar-label">${f.label}</span>
      <div class="funnel-track">
        <div class="funnel-fill" style="width:${f.pct}%; background:${f.color}; color:${f.pct > 20 ? '#f5efe6' : '#3b2f1e'};">
          ${f.pct > 15 ? f.pct + '%' : ''}
        </div>
      </div>
      <span class="funnel-count">${f.count}</span>
    </div>`).join('');

  // Rep table
  document.getElementById('rep-body').innerHTML = d.reps.map(r => {
    const pct = Math.round(r.closed / r.quota * 100);
    return `<tr>
      <td style="font-weight:500">${r.name}</td>
      <td>${r.calls}</td>
      <td>${r.demos}</td>
      <td>${r.closed}</td>
      <td>${quotaBadge(pct)}</td>
      <td>${sparkHTML(r.sparks)}</td>
    </tr>`;
  }).join('');
}

updateDash();
</script>
